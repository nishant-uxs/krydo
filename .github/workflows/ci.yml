name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prevent old in-progress runs from eating minutes when someone pushes fast.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    name: Typecheck + Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # `npm ci` is deterministic but interacts badly with rollup's
        # platform-specific optional dependencies when the lockfile was
        # generated on a different OS (see npm/cli#4828). The lockfile
        # committed here is generated on Windows; regenerating on the Linux
        # runner guarantees the Linux-specific rollup binary gets resolved.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: TypeScript typecheck
        run: npm run check

      - name: Run Vitest with coverage
        # Fake env vars so server/config.ts passes validation during
        # `import config` chains pulled in by a handful of tests. Real
        # secrets live in GitHub Actions Secrets for deploy jobs.
        env:
          JWT_SECRET: ci-test-secret-that-is-at-least-32-chars-long
          SESSION_SECRET: ci-test-session-secret-at-least-32-chars-long
          NODE_ENV: test
        run: npm run test:coverage

      - name: Upload coverage artifact
        # Coverage HTML report is attached to the run for manual inspection.
        # Kept 30 days by default; PRs get a clickable "Artifacts" download.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
