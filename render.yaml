# Render Blueprint for Krydo.
# Deploys the Express server + built Vite SPA as one web service.
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this repo to GitHub (already at github.com/nishant-uxs/krydo).
#   2. In Render dashboard → "New +" → "Blueprint" → pick this repo.
#   3. Fill in the `sync: false` secrets in the Render UI (never commit them).
#   4. Deploy. Liveness probe hits /healthz, readiness probe hits /readyz.
#
# What this file does NOT do:
#   - It does NOT auto-provision the Firebase Admin SDK credential file.
#     Paste the whole service-account JSON into FIREBASE_SERVICE_ACCOUNT.
#     `server/config.ts` reads it directly from the env.
#   - It does NOT cover the Sepolia contract deploy (that's a one-off
#     `npm run deploy:contracts` from your laptop, not part of CI).

services:
  - type: web
    name: krydo
    runtime: node
    plan: free # bump to `starter` or higher for real traffic + no cold starts
    region: oregon # or `frankfurt` / `singapore` — pick closest to users
    branch: main
    # Use `npm install` instead of `npm ci` to work around the long-standing
    # npm bug where platform-specific `optionalDependencies` of packages like
    # rollup (@rollup/rollup-linux-x64-gnu) are omitted when the lockfile was
    # generated on a different OS (Windows/macOS dev -> Linux deploy).
    # See: https://github.com/npm/cli/issues/4828
    # If we ever move to a fully-Linux CI pipeline we can switch back to `npm ci`.
    buildCommand: npm install --include=optional && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "5000"

      # --- Firebase Admin ---
      # Paste the entire service-account JSON as a single string here.
      # server/config.ts supports FIREBASE_SERVICE_ACCOUNT as an alternative
      # to GOOGLE_APPLICATION_CREDENTIALS (which expects a file path — not
      # great on Render's ephemeral filesystem).
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false

      # --- Ethereum / Sepolia ---
      - key: ALCHEMY_API_KEY
        sync: false
      - key: DEPLOYER_PRIVATE_KEY
        sync: false

      # --- Auth ---
      - key: SESSION_SECRET
        generateValue: true # Render auto-generates a 256-bit random string
      - key: JWT_SECRET
        generateValue: true

      # --- Security ---
      # Comma-separated list of public origins that may call the API.
      # Set this to your Render URL (and custom domain if any) once deployed,
      # e.g. "https://krydo.onrender.com,https://krydo.app".
      - key: CORS_ORIGINS
        sync: false

      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "120"

      # --- Client (Vite build-time only) ---
      # WalletConnect requires a projectId from https://cloud.walletconnect.com
      # Without this, WalletConnect is disabled and only MetaMask / Coinbase /
      # injected connectors show up. MetaMask-only still works fine.
      - key: VITE_WALLETCONNECT_PROJECT_ID
        sync: false
